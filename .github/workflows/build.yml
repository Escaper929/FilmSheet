name: Build FilmSheet

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0, v1.0.1 等标签时触发
  workflow_dispatch:   # 允许手动触发

jobs:
  # ========== macOS 打包 ==========
  build-macos:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pillow py2app ttkthemes

      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 创建 setup.py
        run: |
          cat > setup.py << 'EOF'
          from setuptools import setup
          APP = ['main.py']
          DATA_FILES = []
          OPTIONS = {
              'argv_emulation': True,
              'packages': ['PIL', 'ttkthemes'],
              'includes': ['PIL', 'ttkthemes', 'tkinter', 'tkinter.ttk', 'tkinter.filedialog', 'tkinter.messagebox'],
              'plist': {
                  'CFBundleName': 'FilmSheet v${{ steps.version.outputs.VERSION }}',
                  'CFBundleDisplayName': 'FilmSheet v${{ steps.version.outputs.VERSION }}',
                  'CFBundleIdentifier': 'com.filmsheet.app',
                  'CFBundleVersion': '${{ steps.version.outputs.VERSION }}',
                  'CFBundleShortVersionString': '${{ steps.version.outputs.VERSION }}',
                  'NSHighResolutionCapable': True,
              }
          }
          setup(
              app=APP,
              data_files=DATA_FILES,
              options={'py2app': OPTIONS},
              setup_requires=['py2app'],
          )
          EOF

      - name: 打包 macOS 应用
        run: |
          rm -rf build dist
          python setup.py py2app

      - name: 压缩 .app
        run: |
          cd dist
          zip -r ../FilmSheet-macOS.zip FilmSheet.app

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: FilmSheet-macOS
          path: FilmSheet-macOS.zip

  # ========== Windows 打包 ==========
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pillow pyinstaller ttkthemes

      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 打包 Windows 可执行文件
        run: |
          pyinstaller --onefile --windowed --name "FilmSheet-v${{ steps.version.outputs.VERSION }}" main.py

      - name: 压缩 .exe
        run: |
          dir dist
          Compress-Archive -Path "dist/FilmSheet-${{ steps.version.outputs.VERSION }}.exe" -DestinationPath "FilmSheet-Windows.zip"

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: FilmSheet-Windows
          path: FilmSheet-Windows.zip

  # ========== 发布到 GitHub Releases ==========
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: FilmSheet-macOS
          path: artifacts/FilmSheet-macOS

      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: FilmSheet-Windows
          path: artifacts/FilmSheet-Windows

      - name: 检查产物
        run: |
          ls -laR artifacts/

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/FilmSheet-macOS/FilmSheet-macOS.zip
            artifacts/FilmSheet-Windows/FilmSheet-Windows.zip
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
